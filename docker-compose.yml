version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: review-ecosystem-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: review_network
    ports:
      - "5432:5432"
    volumes:
      # Mount schema, seed and grant files to auto-run on container start
      - ./database/migrations/01_schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/migrations/02_seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
      - ./database/migrations/03_grants.sql:/docker-entrypoint-initdb.d/3-grants.sql
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: review-ecosystem-adminer
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
